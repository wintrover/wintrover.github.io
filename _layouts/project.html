---
layout: default
---

<div class="main-container">
  <div class="main-content">
    <!-- Project Title and Link Container -->
    <div class="project-title-container">
      <h1 class="project-title" data-en="{{ page.title }}" data-ko="{{ page.ko_title | default: page.title }}" style="display: inline-block; margin-right: 5px; margin-bottom: 0;">
        {{ page.title }}
      </h1>
      {% if page.github_link %}
        <span class="github-link-inline" style="display: inline-block; vertical-align: baseline;">
          <a href="{{ page.github_link }}" target="_blank" class="project-link" style="font-size: 0.9em;">GitHub</a>
        </span>
      {% endif %}
    </div>
    <!-- Development Period -->
    <p class="period" data-en="Development Period: {{ page.dev_period }}" data-ko="개발 기간: {{ page.ko_dev_period | default: page.dev_period }}">Development Period: {{ page.dev_period }}</p>

    <!-- YouTube Embed (optional) -->
    {% if page.youtube_embed %}
      <div class="youtube-container" style="text-align: center; margin-bottom: 20px;">
        <iframe 
          class="youtube-embed" 
          src="{{ page.youtube_embed }}" 
          title="{{ page.title }}_Demo" 
          frameborder="0" 
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
          referrerpolicy="strict-origin-when-cross-origin" 
          allowfullscreen>
        </iframe>
      </div>
    {% endif %}

    <!-- Main Content from Markdown -->
    {{ content }}
  </div>
</div>
