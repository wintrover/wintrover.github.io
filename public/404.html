<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>wintrover - Fullstack AI Application Architect</title>
  <link rel="icon" type="image/png" href="/blog/images/profile.png" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <script type="module">
    (() => {
      const path = window.location.pathname || "/";
      const search = window.location.search || "";
      const hash = window.location.hash || "";

      const pickLang = () => {
        const nav = (navigator.language || "").toLowerCase();
        return nav.startsWith("ko") ? "ko" : "en";
      };

      const matchLangPrefix = path.match(/^\/(ko|en)(\/|$)/);
      const lang = matchLangPrefix ? matchLangPrefix[1] : pickLang();
      const langBase = `/${lang}`;

      if (path === "/" || path === "/index.html") {
        window.location.replace(`${langBase}/`);
        return;
      }

      if (matchLangPrefix) {
        const rest = path.slice(langBase.length) || "/";
        window.location.replace(`${langBase}/#${rest}${search}${hash}`);
        return;
      }

      window.location.replace(`${langBase}/#${path}${search}${hash}`);
    })();
  </script>
</head>
<body>
  <div id="app">
    <div style="text-align: center; padding: 50px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
      <h1>Redirecting...</h1>
      <p>If you're not redirected automatically, <a href="/blog/">click here</a>.</p>
    </div>
  </div>
</body>
</html>
