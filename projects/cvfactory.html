<div class="section">
  <h2 data-en="Technical Challenges and Solutions" data-ko="기술적 도전과 해결 과정"></h2>
  <p data-en="Key challenges faced during development and the innovative solutions implemented." data-ko="개발 과정에서 직면한 주요 도전 과제와 구현된 혁신적인 해결책입니다."></p>

  <hr class="subsection-divider" />

  <div class="challenges">
    <details class="challenge-item">
      <summary>
        <h3 data-en="CSRF Protection Middleware Issue" data-ko="CSRF 보호 미들웨어 문제"></h3>
      </summary>
      <div class="challenge-content">
        <div class="challenge-description">
          <h4 data-en="Problem" data-ko="문제"></h4>
          <p data-en="Encountered 'MiddlewareMixin.init() missing 1 required positional argument: get_response' error during CSRF verification in API views, causing insecure API endpoints despite Django's built-in protection." data-ko="API 뷰의 CSRF 검증 중 'MiddlewareMixin.init() missing 1 required positional argument: get_response' 오류가 발생하여 Django의 내장 보호 기능에도 불구하고 API 엔드포인트가 안전하지 않게 되었습니다."></p>
          
          <h4 data-en="Solution" data-ko="해결책"></h4>
          <p data-en="Replaced direct instantiation of CsrfViewMiddleware with proper Django decorators (@csrf_protect) and implemented get_token(request) for token generation, maintaining security while fixing the initialization error." data-ko="CsrfViewMiddleware의 직접 인스턴스화를 적절한 Django 데코레이터(@csrf_protect)로 대체하고 토큰 생성을 위해 get_token(request)를 구현하여 초기화 오류를 수정하면서 보안을 유지했습니다."></p>
          
          <div class="code-snippet">

<figure class="highlight"><pre><code class="language-python" data-lang="python"><span class="c1"># 수정 전
</span><span class="k">try</span><span class="p">:</span>
    <span class="n">reason</span> <span class="o">=</span> <span class="n">CsrfViewMiddleware</span><span class="p">().</span><span class="n">process_view</span><span class="p">(</span><span class="n">request</span><span class="p">,</span> <span class="bp">None</span><span class="p">,</span> <span class="p">(),</span> <span class="p">{})</span>
    <span class="k">if</span> <span class="n">reason</span><span class="p">:</span>
        <span class="n">logger</span><span class="p">.</span><span class="n">error</span><span class="p">(</span><span class="sa">f</span><span class="s">" CSRF 보호로 인해 403 발생: </span><span class="si">{</span><span class="n">reason</span><span class="si">}</span><span class="s">"</span><span class="p">)</span>
<span class="k">except</span> <span class="nb">Exception</span> <span class="k">as</span> <span class="n">e</span><span class="p">:</span>
    <span class="n">logger</span><span class="p">.</span><span class="n">error</span><span class="p">(</span><span class="sa">f</span><span class="s">" CSRF 검사 중 오류 발생: </span><span class="si">{</span><span class="nb">str</span><span class="p">(</span><span class="n">e</span><span class="p">)</span><span class="si">}</span><span class="s">"</span><span class="p">)</span>

<span class="c1"># 수정 후
</span><span class="o">@</span><span class="n">api_view</span><span class="p">([</span><span class="s">"OPTIONS"</span><span class="p">,</span> <span class="s">"POST"</span><span class="p">,</span> <span class="s">"GET"</span><span class="p">])</span>
<span class="o">@</span><span class="n">permission_classes</span><span class="p">([</span><span class="n">AllowAny</span><span class="p">])</span>
<span class="o">@</span><span class="n">csrf_protect</span>  <span class="c1"># @csrf_exempt 대신 @csrf_protect 사용
</span><span class="o">@</span><span class="n">ensure_csrf_cookie</span>
<span class="k">def</span> <span class="nf">create_resume</span><span class="p">(</span><span class="n">request</span><span class="p">):</span>
    <span class="c1"># CSRF 토큰 생성 및 가져오기
</span>    <span class="n">csrf_token</span> <span class="o">=</span> <span class="n">get_token</span><span class="p">(</span><span class="n">request</span><span class="p">)</span>
    <span class="n">logger</span><span class="p">.</span><span class="n">debug</span><span class="p">(</span><span class="sa">f</span><span class="s">" CSRF 쿠키: </span><span class="si">{</span><span class="n">request</span><span class="p">.</span><span class="n">COOKIES</span><span class="p">.</span><span class="n">get</span><span class="p">(</span><span class="s">'csrftoken'</span><span class="p">)</span><span class="si">}</span><span class="s">"</span><span class="p">)</span>
    <span class="n">logger</span><span class="p">.</span><span class="n">debug</span><span class="p">(</span><span class="sa">f</span><span class="s">" CSRF 토큰: </span><span class="si">{</span><span class="n">csrf_token</span><span class="si">}</span><span class="s">"</span><span class="p">)</span>
    <span class="c1"># ... 기존 코드 ...</span></code></pre></figure>

          </div>
        </div>
      </div>
    </details>

    <hr class="subsection-divider" />

    <details class="challenge-item">
      <summary>
        <h3 data-en="Environment Variable Integration and Security Enhancement" data-ko="환경 변수 통합 및 보안 강화"></h3>
      </summary>
      <div class="challenge-content">
        <div class="challenge-description">
          <h4 data-en="Problem" data-ko="문제"></h4>
          <p data-en="Multiple security issues were identified during the security audit: exposed sensitive information in Git (Django secret key, OAuth credentials), disabled CSRF protection, enabled debug mode in production, and excessively verbose logging that could leak sensitive data." data-ko="보안 감사 중 여러 보안 문제가 확인되었습니다: Git에 노출된 민감한 정보(Django 시크릿 키, OAuth 자격 증명), 비활성화된 CSRF 보호, 프로덕션 환경에서의 디버그 모드 활성화, 그리고 민감한 데이터가 유출될 수 있는 과도한 로깅 등이 있었습니다."></p>
          
          <h4 data-en="Solution" data-ko="해결책"></h4>
          <p data-en="Implemented a comprehensive security improvement plan:" data-ko="포괄적인 보안 개선 계획을 구현했습니다:"></p>
          
          <ol>
            <li data-en="Environment variable consolidation: Integrated scattered environment variables (.env, secretkey.env, groq.env) into a single .env file for better security management" data-ko="환경 변수 통합: 분산된 환경 변수(.env, secretkey.env, groq.env)를 단일 .env 파일로 통합하여 보안 관리 개선"></li>
            <li data-en="Strengthened .gitignore settings: Explicitly excluded all sensitive files to prevent accidental commits" data-ko=".gitignore 설정 강화: 실수로 인한 커밋을 방지하기 위해 모든 민감한 파일을 명시적으로 제외"></li>
            <li data-en="Enhanced CSRF protection: Replaced @csrf_exempt with @csrf_protect and fixed CSRF token setup in API endpoints" data-ko="CSRF 보호 강화: @csrf_exempt를 @csrf_protect로 대체하고 API 엔드포인트에서 CSRF 토큰 설정 수정"></li>
            <li data-en="Removed hardcoded secrets: Eliminated default hardcoded secret keys in settings.py" data-ko="하드코딩된 시크릿 제거: settings.py에서 기본 하드코딩된 시크릿 키 제거"></li>
          </ol>
          
          <div class="code-snippet">

<figure class="highlight"><pre><code class="language-diff" data-lang="diff"><span class="err">#</span> .gitignore 개선
<span class="gi">+ *.env
+ .env
+ .env.*
+ secretkey.env
+ groq.env
+ *secret*.env
+ *api_key*.env
+ cvfactory/*.env
</span>
# settings.py 환경 변수 로드 개선
<span class="gd">- load_dotenv(dotenv_path=BASE_DIR / "secretkey.env")
- SECRET_KEY = os.getenv("DJANGO_SECRET_KEY", "django-insecure-7q@k&amp;$)+32d7r8nvr!sy3em4y^m19)58yf8)&amp;_je+e&amp;2f)parw")
</span><span class="gi">+ load_dotenv(dotenv_path=BASE_DIR / ".env")
+ SECRET_KEY = os.getenv("DJANGO_SECRET_KEY")
</span>
# API 엔드포인트 CSRF 보호 개선
<span class="gd">- @csrf_exempt  # CSRF 보호를 비활성화 (개발 환경에서만 사용)
</span><span class="gi">+ @csrf_protect  # CSRF 보호 활성화</span></code></pre></figure>

          </div>

          <h4 data-en="Results" data-ko="결과"></h4>
          <p data-en="The security improvements yielded several benefits:" data-ko="보안 개선으로 다음과 같은 이점을 얻었습니다:"></p>
          
          <ul>
            <li data-en="Enhanced API endpoint security with proper CSRF protection" data-ko="적절한 CSRF 보호로 API 엔드포인트 보안 강화"></li>
            <li data-en="Eliminated risk of exposing sensitive credentials in version control" data-ko="버전 관리에서 민감한 자격 증명이 노출될 위험 제거"></li>
            <li data-en="Better environment variable management through consolidation" data-ko="통합을 통한 환경 변수 관리 개선"></li>
            <li data-en="Maintained full application functionality with improved security" data-ko="보안이 향상된 상태에서 전체 애플리케이션 기능 유지"></li>
          </ul>
          
          <h4 data-en="Additional Security Recommendations" data-ko="추가 보안 권장사항"></h4>
          <p data-en="For future improvements:" data-ko="향후 개선 사항:"></p>
          
          <ul>
            <li data-en="Configure proper Django logging to prevent sensitive data leakage" data-ko="민감한 데이터 유출을 방지하는 적절한 Django 로깅 구성"></li>
            <li data-en="Implement proper authentication and authorization for sensitive API endpoints" data-ko="민감한 API 엔드포인트에 대한 적절한 인증 및 권한 부여 구현"></li>
            <li data-en="Set up proper CORS restrictions in production environments" data-ko="프로덕션 환경에서 적절한 CORS 제한 설정"></li>
            <li data-en="Implement environment-specific configuration (dev/prod) to ensure DEBUG=False in production" data-ko="프로덕션에서 DEBUG=False를 보장하기 위한 환경별 구성(개발/프로덕션) 구현"></li>
          </ul>
        </div>
      </div>
    </details>

    <hr class="subsection-divider" />

    <details class="challenge-item">
      <summary>
        <h3 data-en="Groq API Token Limit Overflow" data-ko="Groq API 토큰 한도 초과 문제"></h3>
      </summary>
      <div class="challenge-content">
        <div class="challenge-description">
          <h4 data-en="Problem" data-ko="문제"></h4>
          <p data-en="API calls failed with '413: Request too large for model qwen-qwq-32b' errors, as our request with job descriptions, company info, and user stories exceeded the 6,000 token limit (requesting 12,097 tokens)." data-ko="채용 공고, 회사 정보, 사용자 스토리를 포함한 요청이 6,000 토큰 한도를 초과하여(12,097 토큰 요청) '413: Request too large for model qwen-qwq-32b' 오류로 API 호출이 실패했습니다."></p>
          
          <h4 data-en="Solution" data-ko="해결책"></h4>
          <p data-en="Implemented a multi-stage approach that breaks down the request into three smaller API calls: 1) job/company analysis (1,500 tokens), 2) resume draft creation (2,000 tokens), and 3) final resume polishing (2,000 tokens)." data-ko="요청을 세 개의 작은 API 호출로 분할하는 다단계 접근 방식을 구현했습니다: 1) 채용/회사 분석(1,500 토큰), 2) 자기소개서 초안 작성(2,000 토큰), 3) 최종 자기소개서 완성(2,000 토큰)."></p>
          
          <div class="code-snippet">

      <summary>
        <h3 data-en="Frontend-Backend CSRF Token Integration" data-ko="프론트엔드-백엔드 CSRF 토큰 통합 문제"></h3>
      </summary>
      <div class="challenge-content">
        <div class="challenge-description">
          <h4 data-en="Problem" data-ko="문제"></h4>
          <p data-en="Cross-site request forgery (CSRF) warnings appeared in logs during resume creation API calls. Frontend JavaScript wasn't properly handling CSRF tokens required by Django's security middleware, leading to potential 403 errors." data-ko="자기소개서 생성 API 호출 중 로그에 교차 사이트 요청 위조(CSRF) 경고가 표시되었습니다. 프론트엔드 JavaScript가 Django의 보안 미들웨어에서 요구하는 CSRF 토큰을 제대로 처리하지 않아 403 오류가 발생할 가능성이 있었습니다."></p>
          
          <h4 data-en="Solution" data-ko="해결책"></h4>
          <p data-en="Implemented a two-step API call approach in the frontend JavaScript: first request fetches the CSRF token, then the second request includes this token in the header for secure API calls." data-ko="프론트엔드 JavaScript에서 두 단계 API 호출 접근 방식을 구현했습니다: 첫 번째 요청은 CSRF 토큰을 가져오고, 두 번째 요청은 안전한 API 호출을 위해 헤더에 이 토큰을 포함합니다."></p>
          
          <div class="code-snippet">

<figure class="highlight"><pre><code class="language-javascript" data-lang="javascript"><span class="c1">// 수정 전: CSRF 토큰 없이 직접 API 호출</span>
<span class="k">async</span> <span class="kd">function</span> <span class="nx">generateResume</span><span class="p">()</span> <span class="p">{</span>
    <span class="kd">const</span> <span class="nx">data</span> <span class="o">=</span> <span class="p">{</span>
        <span class="na">recruitment_notice_url</span><span class="p">:</span> <span class="nb">document</span><span class="p">.</span><span class="nx">getElementById</span><span class="p">(</span><span class="dl">'</span><span class="s1">job-url</span><span class="dl">'</span><span class="p">).</span><span class="nx">value</span><span class="p">,</span>
        <span class="na">target_company_url</span><span class="p">:</span> <span class="nb">document</span><span class="p">.</span><span class="nx">getElementById</span><span class="p">(</span><span class="dl">'</span><span class="s1">company-url</span><span class="dl">'</span><span class="p">).</span><span class="nx">value</span><span class="p">,</span>
        <span class="na">user_story</span><span class="p">:</span> <span class="nb">document</span><span class="p">.</span><span class="nx">getElementById</span><span class="p">(</span><span class="dl">'</span><span class="s1">user-story</span><span class="dl">'</span><span class="p">).</span><span class="nx">value</span>
    <span class="p">};</span>

    <span class="k">try</span> <span class="p">{</span>
        <span class="kd">const</span> <span class="nx">response</span> <span class="o">=</span> <span class="k">await</span> <span class="nx">fetch</span><span class="p">(</span><span class="dl">'</span><span class="s1">/api/resume/create/</span><span class="dl">'</span><span class="p">,</span> <span class="p">{</span>
            <span class="na">method</span><span class="p">:</span> <span class="dl">'</span><span class="s1">POST</span><span class="dl">'</span><span class="p">,</span>
            <span class="na">headers</span><span class="p">:</span> <span class="p">{</span>
                <span class="dl">'</span><span class="s1">Content-Type</span><span class="dl">'</span><span class="p">:</span> <span class="dl">'</span><span class="s1">application/json</span><span class="dl">'</span><span class="p">,</span>
            <span class="p">},</span>
            <span class="na">body</span><span class="p">:</span> <span class="nx">JSON</span><span class="p">.</span><span class="nx">stringify</span><span class="p">(</span><span class="nx">data</span><span class="p">)</span>
        <span class="p">});</span>
        <span class="c1">// ... 결과 처리 ...</span>
    <span class="p">}</span> <span class="k">catch</span> <span class="p">(</span><span class="nx">error</span><span class="p">)</span> <span class="p">{</span>
        <span class="nx">console</span><span class="p">.</span><span class="nx">error</span><span class="p">(</span><span class="dl">'</span><span class="s1">Error:</span><span class="dl">'</span><span class="p">,</span> <span class="nx">error</span><span class="p">);</span>
    <span class="p">}</span>
<span class="p">}</span>

<span class="c1">// 수정 후: CSRF 토큰을 먼저 요청 후 API 호출</span>
<span class="k">async</span> <span class="kd">function</span> <span class="nx">generateResume</span><span class="p">()</span> <span class="p">{</span>
    <span class="kd">const</span> <span class="nx">data</span> <span class="o">=</span> <span class="p">{</span>
        <span class="na">recruitment_notice_url</span><span class="p">:</span> <span class="nb">document</span><span class="p">.</span><span class="nx">getElementById</span><span class="p">(</span><span class="dl">'</span><span class="s1">job-url</span><span class="dl">'</span><span class="p">).</span><span class="nx">value</span><span class="p">,</span>
        <span class="na">target_company_url</span><span class="p">:</span> <span class="nb">document</span><span class="p">.</span><span class="nx">getElementById</span><span class="p">(</span><span class="dl">'</span><span class="s1">company-url</span><span class="dl">'</span><span class="p">).</span><span class="nx">value</span><span class="p">,</span>
        <span class="na">user_story</span><span class="p">:</span> <span class="nb">document</span><span class="p">.</span><span class="nx">getElementById</span><span class="p">(</span><span class="dl">'</span><span class="s1">user-story</span><span class="dl">'</span><span class="p">).</span><span class="nx">value</span>
    <span class="p">};</span>

    <span class="k">try</span> <span class="p">{</span>
        <span class="c1">// 1단계: CSRF 토큰 가져오기</span>
        <span class="kd">const</span> <span class="nx">tokenResponse</span> <span class="o">=</span> <span class="k">await</span> <span class="nx">fetch</span><span class="p">(</span><span class="dl">'</span><span class="s1">/api/resume/create/</span><span class="dl">'</span><span class="p">,</span> <span class="p">{</span>
            <span class="na">method</span><span class="p">:</span> <span class="dl">'</span><span class="s1">GET</span><span class="dl">'</span><span class="p">,</span>
            <span class="na">headers</span><span class="p">:</span> <span class="p">{</span>
                <span class="dl">'</span><span class="s1">Accept</span><span class="dl">'</span><span class="p">:</span> <span class="dl">'</span><span class="s1">application/json</span><span class="dl">'</span><span class="p">,</span>
            <span class="p">},</span>
        <span class="p">});</span>
        
        <span class="k">if</span> <span class="p">(</span><span class="nx">tokenResponse</span><span class="p">.</span><span class="nx">ok</span><span class="p">)</span> <span class="p">{</span>
            <span class="c1">// 2단계: 토큰을 사용하여 실제 요청</span>
            <span class="kd">const</span> <span class="nx">csrfToken</span> <span class="o">=</span> <span class="nx">tokenResponse</span><span class="p">.</span><span class="nx">headers</span><span class="p">.</span><span class="kd">get</span><span class="p">(</span><span class="dl">'</span><span class="s1">X-CSRFToken</span><span class="dl">'</span><span class="p">);</span>
            
            <span class="kd">const</span> <span class="nx">response</span> <span class="o">=</span> <span class="k">await</span> <span class="nx">fetch</span><span class="p">(</span><span class="dl">'</span><span class="s1">/api/resume/create/</span><span class="dl">'</span><span class="p">,</span> <span class="p">{</span>
                <span class="na">method</span><span class="p">:</span> <span class="dl">'</span><span class="s1">POST</span><span class="dl">'</span><span class="p">,</span>
                <span class="na">headers</span><span class="p">:</span> <span class="p">{</span>
                    <span class="dl">'</span><span class="s1">Content-Type</span><span class="dl">'</span><span class="p">:</span> <span class="dl">'</span><span class="s1">application/json</span><span class="dl">'</span><span class="p">,</span>
                    <span class="dl">'</span><span class="s1">X-CSRFToken</span><span class="dl">'</span><span class="p">:</span> <span class="nx">csrfToken</span>
                <span class="p">},</span>
                <span class="na">body</span><span class="p">:</span> <span class="nx">JSON</span><span class="p">.</span><span class="nx">stringify</span><span class="p">(</span><span class="nx">data</span><span class="p">)</span>
            <span class="p">});</span>
            <span class="c1">// ... 결과 처리 ...</span>
        <span class="p">}</span>
    <span class="p">}</span> <span class="k">catch</span> <span class="p">(</span><span class="nx">error</span><span class="p">)</span> <span class="p">{</span>
        <span class="nx">console</span><span class="p">.</span><span class="nx">error</span><span class="p">(</span><span class="dl">'</span><span class="s1">Error:</span><span class="dl">'</span><span class="p">,</span> <span class="nx">error</span><span class="p">);</span>
    <span class="p">}</span>
<span class="p">}</span></code></pre></figure>

          <h4 data-en="Backend CSRF Handler Improvements" data-ko="백엔드 CSRF 핸들러 개선사항"></h4>
          <p data-en="Also modified the Django backend view to properly handle CSRF tokens with appropriate decorators:" data-ko="적절한 데코레이터로 CSRF 토큰을 올바르게 처리하도록 Django 백엔드 뷰도 수정했습니다:"></p>
          
          <div class="code-snippet">

<figure class="highlight"><pre><code class="language-python" data-lang="python"><span class="c1"># 수정 전: 데코레이터 순서 문제
</span><span class="o">@</span><span class="n">api_view</span><span class="p">([</span><span class="s">"POST"</span><span class="p">])</span>

<span class="o">@</span><span class="n">csrf_exempt</span>

</span><span class="o">@</span><span class="n">api_view</span><span class="p">([</span><span class="s">"OPTIONS"</span><span class="p">,</span> <span class="s">"POST"</span><span class="p">,</span> <span class="s">"GET"</span><span class="p">])</span>
<span class="o">@</span><span class="n">permission_classes</span><span class="p">([</span><span class="n">AllowAny</span><span class="p">])</span>

</span><span class="k">def</span> <span class="nf">create_resume</span><span class="p">(</span><span class="n">request</span><span class="p">):</span>

    <span class="k">if</span> <span class="n">request</span><span class="p">.</span><span class="n">method</span> <span class="o">==</span> <span class="s">"GET"</span><span class="p">:</span>

    <details class="challenge-item">
      <summary>
        <h3 data-en="Groq API Client Initialization Error" data-ko="Groq API 클라이언트 초기화 오류"></h3>
      </summary>
      <div class="challenge-content">
        <div class="challenge-description">
          <h4 data-en="Problem" data-ko="문제"></h4>
          <p data-en="The Groq API client failed to initialize in the production environment, producing the error '__init__() got an unexpected keyword argument 'proxies''. This prevented the core AI functionality from working, as multiple initialization attempts consistently failed with the same proxies parameter error." data-ko="프로덕션 환경에서 Groq API 클라이언트가 초기화되지 않고 '__init__() got an unexpected keyword argument 'proxies'' 오류가 발생했습니다. 여러 초기화 시도가 동일한 proxies 파라미터 오류로 계속 실패하여 핵심 AI 기능이 작동하지 않았습니다."></p>
          
          <h4 data-en="Solution" data-ko="해결책"></h4>
          <p data-en="Implemented a comprehensive solution with two key components:" data-ko="두 가지 핵심 구성 요소가 있는 포괄적인 해결책을 구현했습니다:"></p>
          
          <ol>
            <li data-en="&lt;strong&gt;Original client patching:&lt;/strong&gt; Created a custom patched initialization method for the Groq client that intercepts and removes the problematic 'proxies' parameter before passing arguments to the original initialization method" data-ko="&lt;strong&gt;원본 클라이언트 패치:&lt;/strong&gt; 문제가 되는 'proxies' 파라미터를 가로채서 제거한 후 원본 초기화 메서드에 인수를 전달하는 Groq 클라이언트용 사용자 정의 패치 초기화 메서드 생성"></li>
            <li data-en="&lt;strong&gt;Fallback HTTP client:&lt;/strong&gt; Added a fallback implementation using httpx that directly interfaces with the Groq API without the problematic client if the patched approach fails" data-ko="&lt;strong&gt;대체 HTTP 클라이언트:&lt;/strong&gt; 패치된 접근 방식이 실패할 경우 문제가 있는 클라이언트 없이 Groq API와 직접 인터페이스하는 httpx를 사용한 대체 구현 추가"></li>
          </ol>
          
          <div class="code-snippet">

<figure class="highlight"><pre><code class="language-python" data-lang="python"><span class="c1"># 패치된 초기화 메서드 구현
</span><span class="k">try</span><span class="p">:</span>
    <span class="c1"># 원본 클래스를 직접 패치하여 proxies 문제 해결
</span>    <span class="kn">import</span> <span class="nn">types</span>
    <span class="kn">from</span> <span class="nn">groq</span> <span class="kn">import</span> <span class="n">Client</span>
    <span class="kn">from</span> <span class="nn">groq._client</span> <span class="kn">import</span> <span class="n">Groq</span> <span class="k">as</span> <span class="n">OriginalGroq</span>
    
    <span class="c1"># 원본 __init__ 메서드 가져오기
</span>    <span class="n">original_init</span> <span class="o">=</span> <span class="n">OriginalGroq</span><span class="p">.</span><span class="n">__init__</span>
    
    <span class="c1"># 패치 적용 전에 클래스 정보 출력
</span>    <span class="n">groq_logger</span><span class="p">.</span><span class="n">debug</span><span class="p">(</span><span class="sa">f</span><span class="s">"OriginalGroq 클래스: </span><span class="si">{</span><span class="n">OriginalGroq</span><span class="si">}</span><span class="s">"</span><span class="p">)</span>
    <span class="n">groq_logger</span><span class="p">.</span><span class="n">debug</span><span class="p">(</span><span class="sa">f</span><span class="s">"original_init 메서드: </span><span class="si">{</span><span class="n">original_init</span><span class="si">}</span><span class="s">"</span><span class="p">)</span>
    <span class="n">groq_logger</span><span class="p">.</span><span class="n">debug</span><span class="p">(</span><span class="sa">f</span><span class="s">"original_init 파라미터: </span><span class="si">{</span><span class="n">inspect</span><span class="p">.</span><span class="n">signature</span><span class="p">(</span><span class="n">original_init</span><span class="p">)</span><span class="si">}</span><span class="s">"</span><span class="p">)</span>
    
    <span class="c1"># 모든 인자를 받되 proxies 인자를 무시하는 새로운 __init__ 함수 정의
</span>    <span class="k">def</span> <span class="nf">patched_init</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="o">*</span><span class="n">args</span><span class="p">,</span> <span class="o">**</span><span class="n">kwargs</span><span class="p">):</span>
        <span class="c1"># 원본 kwargs 로깅
</span>        <span class="n">groq_logger</span><span class="p">.</span><span class="n">debug</span><span class="p">(</span><span class="sa">f</span><span class="s">"patched_init 호출 kwargs: </span><span class="si">{</span><span class="n">kwargs</span><span class="si">}</span><span class="s">"</span><span class="p">)</span>
        
        <span class="c1"># proxies 파라미터 제거
</span>        <span class="k">if</span> <span class="s">'proxies'</span> <span class="ow">in</span> <span class="n">kwargs</span><span class="p">:</span>
            <span class="n">groq_logger</span><span class="p">.</span><span class="n">info</span><span class="p">(</span><span class="sa">f</span><span class="s">"proxies 파라미터 제거됨: </span><span class="si">{</span><span class="n">kwargs</span><span class="p">[</span><span class="s">'proxies'</span><span class="p">]</span><span class="si">}</span><span class="s">"</span><span class="p">)</span>
            <span class="k">del</span> <span class="n">kwargs</span><span class="p">[</span><span class="s">'proxies'</span><span class="p">]</span>
            
        <span class="c1"># 수정된 kwargs 로깅
</span>        <span class="n">groq_logger</span><span class="p">.</span><span class="n">debug</span><span class="p">(</span><span class="sa">f</span><span class="s">"수정된 kwargs: </span><span class="si">{</span><span class="n">kwargs</span><span class="si">}</span><span class="s">"</span><span class="p">)</span>
        
        <span class="k">try</span><span class="p">:</span>
            <span class="n">result</span> <span class="o">=</span> <span class="n">original_init</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="o">*</span><span class="n">args</span><span class="p">,</span> <span class="o">**</span><span class="n">kwargs</span><span class="p">)</span>
            <span class="n">groq_logger</span><span class="p">.</span><span class="n">info</span><span class="p">(</span><span class="s">"원본 __init__ 함수 호출 성공"</span><span class="p">)</span>
            <span class="k">return</span> <span class="n">result</span>
        <span class="k">except</span> <span class="nb">Exception</span> <span class="k">as</span> <span class="n">e</span><span class="p">:</span>
            <span class="n">groq_logger</span><span class="p">.</span><span class="n">error</span><span class="p">(</span><span class="sa">f</span><span class="s">"원본 __init__ 함수 호출 중 오류 발생: </span><span class="si">{</span><span class="nb">str</span><span class="p">(</span><span class="n">e</span><span class="p">)</span><span class="si">}</span><span class="s">"</span><span class="p">)</span>
            <span class="n">groq_logger</span><span class="p">.</span><span class="n">debug</span><span class="p">(</span><span class="sa">f</span><span class="s">"오류 상세: </span><span class="si">{</span><span class="n">traceback</span><span class="p">.</span><span class="n">format_exc</span><span class="p">()</span><span class="si">}</span><span class="s">"</span><span class="p">)</span>
            <span class="k">raise</span>
    
    <span class="c1"># 패치 적용
</span>    <span class="n">groq_logger</span><span class="p">.</span><span class="n">info</span><span class="p">(</span><span class="s">"groq.Client 클래스 패치 적용"</span><span class="p">)</span>
    <span class="n">OriginalGroq</span><span class="p">.</span><span class="n">__init__</span> <span class="o">=</span> <span class="n">patched_init</span>
    
    <span class="c1"># 패치 적용 후 클라이언트 초기화 시도
</span>    <span class="n">groq_logger</span><span class="p">.</span><span class="n">info</span><span class="p">(</span><span class="s">"패치된 클래스로 클라이언트 초기화 시도"</span><span class="p">)</span>
    
    <span class="c1"># 최소한의 필수 인자만으로 초기화 시도
</span>    <span class="n">client_params</span> <span class="o">=</span> <span class="p">{</span><span class="s">"api_key"</span><span class="p">:</span> <span class="n">api_key</span><span class="p">}</span>
    <span class="n">groq_logger</span><span class="p">.</span><span class="n">debug</span><span class="p">(</span><span class="sa">f</span><span class="s">"클라이언트 초기화 파라미터: </span><span class="si">{</span><span class="n">client_params</span><span class="si">}</span><span class="s">"</span><span class="p">)</span>
    
    <span class="n">client</span> <span class="o">=</span> <span class="n">Client</span><span class="p">(</span><span class="o">**</span><span class="n">client_params</span><span class="p">)</span>
    <span class="n">groq_logger</span><span class="p">.</span><span class="n">info</span><span class="p">(</span><span class="s">"Groq 클라이언트 초기화 성공 (패치 방식)"</span><span class="p">)</span>
    
<span class="k">except</span> <span class="nb">Exception</span> <span class="k">as</span> <span class="n">e</span><span class="p">:</span>
    <span class="n">groq_logger</span><span class="p">.</span><span class="n">error</span><span class="p">(</span><span class="sa">f</span><span class="s">"Groq 클라이언트 초기화 실패: </span><span class="si">{</span><span class="nb">str</span><span class="p">(</span><span class="n">e</span><span class="p">)</span><span class="si">}</span><span class="s">"</span><span class="p">)</span>
    
    <span class="c1"># 대체 초기화 방법 시도
</span>    <span class="n">groq_logger</span><span class="p">.</span><span class="n">info</span><span class="p">(</span><span class="s">"대체 초기화 방법 시도"</span><span class="p">)</span>
    <span class="k">try</span><span class="p">:</span>
        <span class="c1"># httpx를 사용한 대체 클라이언트 설정
</span>        <span class="kn">import</span> <span class="nn">httpx</span>
        <span class="n">groq_logger</span><span class="p">.</span><span class="n">info</span><span class="p">(</span><span class="s">"httpx를 사용한 대체 클라이언트 설정 시도"</span><span class="p">)</span>
        
        <span class="c1"># 사용자 정의 클래스 생성
</span>        <span class="k">class</span> <span class="nc">SimpleGroqClient</span><span class="p">:</span>
            <span class="k">def</span> <span class="nf">__init__</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">api_key</span><span class="p">):</span>

    <span class="k">except</span> <span class="nb">Exception</span> <span class="k">as</span> <span class="n">alt_e</span><span class="p">:</span>

        <span class="n">groq_logger</span><span class="p">.</span><span class="n">warning</span><span class="p">(</span><span class="s">"이 오류로 인해 AI 기능이 제한됩니다."</span><span class="p">)</span>
