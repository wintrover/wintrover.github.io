<div class="section">
  <h2 data-en="Development Process and Challenges" data-ko="개발 과정 및 도전 과제"></h2>
  <p data-en="This section outlines the challenges faced during the development of the AI model for deepfake detection and how they were resolved." data-ko="이 섹션에서는 딥페이크 감지를 위한 AI 모델 개발 중 직면한 문제와 해결 방법을 설명합니다."></p>

  <hr class="subsection-divider" />

  <!-- 모델 성능과 앱 크기 균형 -->
  <div class="section">
    <h3 data-en="Balancing Model Performance and App Size" data-ko="모델 성능과 앱 크기의 균형"></h3>
    <ul class="steps">
      <li>
        <strong data-en="Problem:" data-ko="문제:"></strong>
        <ul>
          <li data-en="The initial EfficientNet-B4 model was accurate (96%), but resulted in an APK file over 110MB, exceeding the Google Play Store limit." data-ko="초기 EfficientNet-B4 모델은 정확도가 높았지만(96%), APK 파일이 110MB를 초과하여 Google Play 스토어 제한을 넘었습니다."></li>
          <li data-en="The ONNX model alone was 68MB, too large for mobile deployment." data-ko="ONNX 모델만 68MB로, 모바일 배포에 너무 컸습니다."></li>
        </ul>
      </li>
      <li>
        <strong data-en="Solution:" data-ko="해결책:"></strong>
        <ul>
          <li data-en="Switched to EfficientNet-Lite0, reducing model size to 16MB but decreasing accuracy to 91%." data-ko="EfficientNet-Lite0로 전환하여 모델 크기를 16MB로 줄였지만 정확도는 91%로 감소했습니다."></li>
          <li data-en="Implemented model quantization, converting from FP32 to INT8, reducing size by additional 65%." data-ko="모델 양자화를 구현하여 FP32에서 INT8로 변환하고 크기를 추가로 65% 줄였습니다."></li>
        </ul>
      </li>
    </ul>

    <div class="code-block">
      <button class="hover-copy-btn" onclick="copyCode(this)">📋</button>

<figure class="highlight"><pre><code class="language-kotlin" data-lang="kotlin"><span class="c1">// ModelQuantizer.kt 구현 코드의 일부</span>
<span class="nd">@WorkerThread</span>
<span class="k">suspend</span> <span class="k">fun</span> <span class="nf">quantizeModelToInt8</span><span class="p">(</span>
    <span class="n">modelName</span><span class="p">:</span> <span class="nc">String</span><span class="p">,</span>
    <span class="n">calibrationData</span><span class="p">:</span> <span class="nc">List</span><span class="p">&lt;</span><span class="nc">ByteBuffer</span><span class="p">&gt;,</span>
    <span class="n">inputShape</span><span class="p">:</span> <span class="nc">LongArray</span>
<span class="p">):</span> <span class="nc">File</span><span class="p">?</span> <span class="p">=</span> <span class="nf">withContext</span><span class="p">(</span><span class="nc">Dispatchers</span><span class="p">.</span><span class="nc">Default</span><span class="p">)</span> <span class="p">{</span>
    <span class="kd">val</span> <span class="py">quantizedModelFile</span> <span class="p">=</span> <span class="nc">File</span><span class="p">(</span><span class="n">quantizedCacheDir</span><span class="p">,</span> <span class="s">"${modelName.substringBeforeLast("</span><span class="p">.</span><span class="s">")}_int8.onnx"</span><span class="p">)</span>
    
    <span class="c1">// 이미 양자화된 모델이 있는 경우 재사용</span>
    <span class="k">if</span> <span class="p">(</span><span class="n">quantizedModelFile</span><span class="p">.</span><span class="nf">exists</span><span class="p">())</span> <span class="p">{</span>
        <span class="nc">Log</span><span class="p">.</span><span class="nf">d</span><span class="p">(</span><span class="nc">TAG</span><span class="p">,</span> <span class="s">"Quantized model already exists: $modelName"</span><span class="p">)</span>
        <span class="k">return</span><span class="nd">@withContext</span> <span class="n">quantizedModelFile</span>
    <span class="p">}</span>
    
    <span class="k">try</span> <span class="p">{</span>
        <span class="c1">// 원본 모델 바이트 배열 로드</span>
        <span class="kd">val</span> <span class="py">modelBytes</span> <span class="p">=</span> <span class="n">context</span><span class="p">.</span><span class="n">assets</span><span class="p">.</span><span class="k">open</span><span class="p">(</span><span class="n">modelName</span><span class="p">).</span><span class="nf">readBytes</span><span class="p">()</span>
        
        <span class="c1">// 세션 옵션 설정 - 양자화 활성화</span>
        <span class="kd">val</span> <span class="py">sessionOptions</span> <span class="p">=</span> <span class="nc">OrtSession</span><span class="p">.</span><span class="nc">SessionOptions</span><span class="p">()</span>
        <span class="n">sessionOptions</span><span class="p">.</span><span class="nf">setOptimizationLevel</span><span class="p">(</span><span class="nc">OrtSession</span><span class="p">.</span><span class="nc">SessionOptions</span><span class="p">.</span><span class="nc">OptLevel</span><span class="p">.</span><span class="nc">ALL_OPT</span><span class="p">)</span>
        
        <span class="c1">// 구현 후략...</span>
    <span class="p">}</span>
<span class="p">}</span></code></pre></figure>

  <!-- 메모리 누수와 OOM -->
  <div class="section">
    <h3 data-en="Memory Leaks and OOM Crashes" data-ko="메모리 누수와 OOM 오류"></h3>
    <ul class="steps">
      <li>
        <strong data-en="Problem:" data-ko="문제:"></strong>
        <ul>
          <li data-en="The app crashed with OOM (Out of Memory) errors after analyzing 7-8 images, especially on older devices." data-ko="앱이 7-8개의 이미지를 분석한 후 특히 구형 기기에서 OOM(메모리 부족) 오류로 충돌했습니다."></li>
          <li data-en="Memory profile showed Bitmap objects were not being properly released after analysis." data-ko="메모리 프로필에서 분석 후 Bitmap 객체가 제대로 해제되지 않는 것을 확인했습니다."></li>
        </ul>
      </li>
      <li>
        <strong data-en="Solution:" data-ko="해결책:"></strong>
        <ul>
          <li data-en="Implemented proper bitmap recycling in the analysis pipeline." data-ko="분석 파이프라인에서 적절한 비트맵 재활용을 구현했습니다."></li>
          <li data-en="Created a bitmap pool to reuse bitmap objects instead of creating new ones." data-ko="새 비트맵을 생성하는 대신 비트맵 객체를 재사용하기 위한 비트맵 풀을 만들었습니다."></li>
          <li data-en="Added checks for proper release of ONNX tensors after each inference." data-ko="각 추론 후 ONNX 텐서의 적절한 해제를 위한 검사를 추가했습니다."></li>
        </ul>
      </li>
    </ul>

    <div class="code-block">
      <button class="hover-copy-btn" onclick="copyCode(this)">📋</button>

<figure class="highlight"><pre><code class="language-kotlin" data-lang="kotlin"><span class="c1">// 메모리 누수 수정 코드</span>
<span class="k">private</span> <span class="k">fun</span> <span class="nf">processImageWithMemorySafety</span><span class="p">(</span><span class="n">bitmap</span><span class="p">:</span> <span class="nc">Bitmap</span><span class="p">):</span> <span class="nc">DetectionResult</span><span class="p">?</span> <span class="p">{</span>
    <span class="kd">var</span> <span class="py">inputTensor</span><span class="p">:</span> <span class="nc">OnnxTensor</span><span class="p">?</span> <span class="p">=</span> <span class="k">null</span>
    <span class="kd">var</span> <span class="py">resultBitmap</span><span class="p">:</span> <span class="nc">Bitmap</span><span class="p">?</span> <span class="p">=</span> <span class="k">null</span>
    
    <span class="k">try</span> <span class="p">{</span>
        <span class="c1">// ... 처리 코드</span>
        <span class="k">return</span> <span class="n">result</span>
    <span class="p">}</span> <span class="k">catch</span> <span class="p">(</span><span class="n">e</span><span class="p">:</span> <span class="nc">Exception</span><span class="p">)</span> <span class="p">{</span>
        <span class="nc">Log</span><span class="p">.</span><span class="nf">e</span><span class="p">(</span><span class="nc">TAG</span><span class="p">,</span> <span class="s">"Error processing image"</span><span class="p">,</span> <span class="n">e</span><span class="p">)</span>
        <span class="k">return</span> <span class="k">null</span>
    <span class="p">}</span> <span class="k">finally</span> <span class="p">{</span>
        <span class="c1">// 중요: 리소스 정리</span>
        <span class="n">inputTensor</span><span class="o">?.</span><span class="nf">close</span><span class="p">()</span>
        
        <span class="k">if</span> <span class="p">(</span><span class="n">bitmap</span> <span class="p">!=</span> <span class="n">resultBitmap</span><span class="p">)</span> <span class="p">{</span>
            <span class="n">resultBitmap</span><span class="o">?.</span><span class="nf">recycle</span><span class="p">()</span>
        <span class="p">}</span>
    <span class="p">}</span>
<span class="p">}</span></code></pre></figure>

  <!-- 얼굴 검출 정확도 -->
  <div class="section">
    <h3 data-en="Face Detection Accuracy Issues" data-ko="얼굴 검출 정확도 문제"></h3>
    <ul class="steps">
      <li>
        <strong data-en="Problem:" data-ko="문제:"></strong>
        <ul>
          <li data-en="Initial face detection using CascadeClassifier had poor results with non-frontal faces." data-ko="CascadeClassifier를 사용한 초기 얼굴 검출은 정면이 아닌 얼굴에서 결과가 좋지 않았습니다."></li>
          <li data-en="Missed over 30% of faces in profile or partial views, leading to incorrect deepfake assessments." data-ko="프로필이나 부분적 시야에서 30% 이상의 얼굴을 놓쳐 잘못된 딥페이크 평가로 이어졌습니다."></li>
        </ul>
      </li>
      <li>
        <strong data-en="Solution:" data-ko="해결책:"></strong>
        <ul>
          <li data-en="Replaced with YOLO11n-Face for more robust detection (accuracy improved to 94%)." data-ko="더 강력한 검출을 위해 YOLO11n-Face로 대체했습니다(정확도 94%로 향상)."></li>
          <li data-en="Implemented box expansion logic to capture more of the face context for better classification." data-ko="더 나은 분류를 위해 얼굴 컨텍스트를 더 많이 캡처하도록 박스 확장 로직을 구현했습니다."></li>
        </ul>
      </li>
    </ul>

    <div class="code-block">
      <button class="hover-copy-btn" onclick="copyCode(this)">📋</button>

<figure class="highlight"><pre><code class="language-kotlin" data-lang="kotlin"><span class="cm">/**
 * 얼굴 영역을 상하좌우로 확장하여 Crop
 * 안전한 경계 검사 추가
 */</span>
<span class="k">private</span> <span class="k">fun</span> <span class="nf">cropFaceArea</span><span class="p">(</span>
    <span class="n">src</span><span class="p">:</span> <span class="nc">Bitmap</span><span class="p">,</span>
    <span class="n">box</span><span class="p">:</span> <span class="nc">FaceBox</span><span class="p">,</span>
    <span class="n">extendRatio</span><span class="p">:</span> <span class="nc">Float</span> <span class="p">=</span> <span class="mf">0.5f</span>
<span class="p">):</span> <span class="nc">Bitmap</span> <span class="p">{</span>
    <span class="c1">// 얼굴 영역 확장 로직</span>
    <span class="kd">val</span> <span class="py">width</span> <span class="p">=</span> <span class="n">box</span><span class="p">.</span><span class="n">x2</span> <span class="p">-</span> <span class="n">box</span><span class="p">.</span><span class="n">x1</span>
    <span class="kd">val</span> <span class="py">height</span> <span class="p">=</span> <span class="n">box</span><span class="p">.</span><span class="n">y2</span> <span class="p">-</span> <span class="n">box</span><span class="p">.</span><span class="n">y1</span>
    
    <span class="kd">val</span> <span class="py">extendX</span> <span class="p">=</span> <span class="n">width</span> <span class="p">*</span> <span class="n">extendRatio</span>
    <span class="kd">val</span> <span class="py">extendY</span> <span class="p">=</span> <span class="n">height</span> <span class="p">*</span> <span class="n">extendRatio</span>
    
    <span class="c1">// 안전한 경계 계산</span>
    <span class="kd">val</span> <span class="py">x1</span> <span class="p">=</span> <span class="p">(</span><span class="n">box</span><span class="p">.</span><span class="n">x1</span> <span class="p">-</span> <span class="n">extendX</span><span class="p">).</span><span class="nf">coerceIn</span><span class="p">(</span><span class="mf">0f</span><span class="p">,</span> <span class="n">src</span><span class="p">.</span><span class="n">width</span><span class="p">.</span><span class="nf">toFloat</span><span class="p">())</span>
    <span class="kd">val</span> <span class="py">y1</span> <span class="p">=</span> <span class="p">(</span><span class="n">box</span><span class="p">.</span><span class="n">y1</span> <span class="p">-</span> <span class="n">extendY</span><span class="p">).</span><span class="nf">coerceIn</span><span class="p">(</span><span class="mf">0f</span><span class="p">,</span> <span class="n">src</span><span class="p">.</span><span class="n">height</span><span class="p">.</span><span class="nf">toFloat</span><span class="p">())</span>
    <span class="kd">val</span> <span class="py">x2</span> <span class="p">=</span> <span class="p">(</span><span class="n">box</span><span class="p">.</span><span class="n">x2</span> <span class="p">+</span> <span class="n">extendX</span><span class="p">).</span><span class="nf">coerceIn</span><span class="p">(</span><span class="mf">0f</span><span class="p">,</span> <span class="n">src</span><span class="p">.</span><span class="n">width</span><span class="p">.</span><span class="nf">toFloat</span><span class="p">())</span>
    <span class="kd">val</span> <span class="py">y2</span> <span class="p">=</span> <span class="p">(</span><span class="n">box</span><span class="p">.</span><span class="n">y2</span> <span class="p">+</span> <span class="n">extendY</span><span class="p">).</span><span class="nf">coerceIn</span><span class="p">(</span><span class="mf">0f</span><span class="p">,</span> <span class="n">src</span><span class="p">.</span><span class="n">height</span><span class="p">.</span><span class="nf">toFloat</span><span class="p">())</span>
    
    <span class="c1">// 안전하게 크롭</span>
    <span class="k">return</span> <span class="nc">Bitmap</span><span class="p">.</span><span class="nf">createBitmap</span><span class="p">(</span>
        <span class="n">src</span><span class="p">,</span>
        <span class="n">x1</span><span class="p">.</span><span class="nf">toInt</span><span class="p">(),</span>
        <span class="n">y1</span><span class="p">.</span><span class="nf">toInt</span><span class="p">(),</span>
        <span class="p">(</span><span class="n">x2</span> <span class="p">-</span> <span class="n">x1</span><span class="p">).</span><span class="nf">toInt</span><span class="p">(),</span>
        <span class="p">(</span><span class="n">y2</span> <span class="p">-</span> <span class="n">y1</span><span class="p">).</span><span class="nf">toInt</span><span class="p">()</span>
    <span class="p">)</span>
<span class="p">}</span></code></pre></figure>

  <!-- UI 응답성 -->
  <div class="section">
    <h3 data-en="UI Responsiveness During Analysis" data-ko="분석 중 UI 응답성"></h3>
    <ul class="steps">
      <li>
        <strong data-en="Problem:" data-ko="문제:"></strong>
        <ul>
          <li data-en="The UI froze during model inference, causing poor user experience with ANR warnings." data-ko="모델 추론 중 UI가 멈춰 ANR 경고와 함께 사용자 경험이 저하되었습니다."></li>
          <li data-en="Users reported 'App not responding' errors when processing large images." data-ko="사용자들은 큰 이미지를 처리할 때 '앱이 응답하지 않음' 오류를 보고했습니다."></li>
        </ul>
      </li>
      <li>
        <strong data-en="Solution:" data-ko="해결책:"></strong>
        <ul>
          <li data-en="Migrated all inference code to coroutines with Dispatchers.Default." data-ko="모든 추론 코드를 Dispatchers.Default와 함께 코루틴으로 마이그레이션했습니다."></li>
          <li data-en="Added dynamic progress UI with animations to keep the UI thread responsive." data-ko="UI 스레드의 응답성을 유지하기 위해 애니메이션이 있는 동적 진행 상황 UI를 추가했습니다."></li>
          <li data-en="Implemented process cancellation support for long-running analyses." data-ko="장시간 실행되는 분석을 위한 프로세스 취소 지원을 구현했습니다."></li>
        </ul>
      </li>
    </ul>

    <div class="code-block">
      <button class="hover-copy-btn" onclick="copyCode(this)">📋</button>

<figure class="highlight"><pre><code class="language-kotlin" data-lang="kotlin"><span class="c1">// 코루틴을 활용한 비동기 처리</span>
<span class="k">private</span> <span class="kd">val</span> <span class="py">analyzeScope</span> <span class="p">=</span> <span class="nc">CoroutineScope</span><span class="p">(</span><span class="nc">Dispatchers</span><span class="p">.</span><span class="nc">Default</span> <span class="p">+</span> <span class="nc">SupervisorJob</span><span class="p">())</span>
<span class="k">private</span> <span class="kd">var</span> <span class="py">currentAnalysisJob</span><span class="p">:</span> <span class="nc">Job</span><span class="p">?</span> <span class="p">=</span> <span class="k">null</span>

<span class="k">fun</span> <span class="nf">analyzeImage</span><span class="p">(</span><span class="n">bitmap</span><span class="p">:</span> <span class="nc">Bitmap</span><span class="p">,</span> <span class="n">callback</span><span class="p">:</span> <span class="p">(</span><span class="nc">DetectionResult</span><span class="p">?)</span> <span class="p">-&gt;</span> <span class="nc">Unit</span><span class="p">)</span> <span class="p">{</span>
    <span class="c1">// 실행 중인 이전 작업 취소</span>
    <span class="n">currentAnalysisJob</span><span class="o">?.</span><span class="nf">cancel</span><span class="p">()</span>
    
    <span class="c1">// 새 분석 작업 시작</span>
    <span class="n">currentAnalysisJob</span> <span class="p">=</span> <span class="n">analyzeScope</span><span class="p">.</span><span class="nf">launch</span> <span class="p">{</span>
        <span class="kd">val</span> <span class="py">result</span> <span class="p">=</span> <span class="nf">detectAndClassifyAsync</span><span class="p">(</span><span class="n">bitmap</span><span class="p">)</span>
        
        <span class="c1">// UI 스레드에서 결과 전달</span>
        <span class="nf">withContext</span><span class="p">(</span><span class="nc">Dispatchers</span><span class="p">.</span><span class="nc">Main</span><span class="p">)</span> <span class="p">{</span>
            <span class="nf">callback</span><span class="p">(</span><span class="n">result</span><span class="p">)</span>
        <span class="p">}</span>
    <span class="p">}</span>
<span class="p">}</span></code></pre></figure>

    </div>
  </div>

  <!-- 모델 버전 불일치 -->
  <div class="section">
    <h3 data-en="ONNX Runtime Version Mismatches" data-ko="ONNX 런타임 버전 불일치"></h3>
    <ul class="steps">
      <li>
        <strong data-en="Problem:" data-ko="문제:"></strong>
        <ul>
          <li data-en="The model trained with PyTorch 1.10 wouldn't load correctly with ONNX Runtime 1.14 on Android." data-ko="PyTorch 1.10으로 학습된 모델이 Android의 ONNX 런타임 1.14에서 제대로 로드되지 않았습니다."></li>
          <li data-en="Error: 'This model requires opset version 12 but the runtime only supports until opset version 11'." data-ko="오류: '이 모델은 opset 버전 12가 필요하지만 런타임은 opset 버전 11까지만 지원합니다.'"></li>
        </ul>
      </li>
      <li>
        <strong data-en="Solution:" data-ko="해결책:"></strong>
        <ul>
          <li data-en="Re-exported model with explicit opset_version=11 to ensure compatibility." data-ko="호환성을 보장하기 위해 명시적 opset_version=11로 모델을 다시 내보냈습니다."></li>
          <li data-en="Created a model converter script that handles versioning issues automatically." data-ko="버전 관리 문제를 자동으로 처리하는 모델 변환기 스크립트를 만들었습니다."></li>
        </ul>
      </li>
    </ul>

    <div class="code-block">
      <button class="hover-copy-btn" onclick="copyCode(this)">📋</button>

<figure class="highlight"><pre><code class="language-python" data-lang="python"><span class="c1"># 모델 재변환 스크립트
</span><span class="kn">import</span> <span class="nn">torch</span>
<span class="kn">import</span> <span class="nn">torchvision.models</span> <span class="k">as</span> <span class="n">models</span>

<span class="k">def</span> <span class="nf">export_model_with_compatible_opset</span><span class="p">(</span><span class="n">model_path</span><span class="p">,</span> <span class="n">output_path</span><span class="p">,</span> <span class="n">opset_version</span><span class="o">=</span><span class="mi">11</span><span class="p">):</span>
    <span class="c1"># 모델 로드
</span>    <span class="n">model</span> <span class="o">=</span> <span class="n">torch</span><span class="p">.</span><span class="n">load</span><span class="p">(</span><span class="n">model_path</span><span class="p">)</span>
    <span class="n">model</span><span class="p">.</span><span class="nb">eval</span><span class="p">()</span>
    
    <span class="c1"># 더미 입력
</span>    <span class="n">x</span> <span class="o">=</span> <span class="n">torch</span><span class="p">.</span><span class="n">randn</span><span class="p">(</span><span class="mi">1</span><span class="p">,</span> <span class="mi">3</span><span class="p">,</span> <span class="mi">128</span><span class="p">,</span> <span class="mi">128</span><span class="p">,</span> <span class="n">requires_grad</span><span class="o">=</span><span class="bp">False</span><span class="p">)</span>
    
    <span class="c1"># ONNX로 내보내기 (opset 버전 명시)
</span>    <span class="n">torch</span><span class="p">.</span><span class="n">onnx</span><span class="p">.</span><span class="n">export</span><span class="p">(</span>
        <span class="n">model</span><span class="p">,</span>
        <span class="n">x</span><span class="p">,</span>
        <span class="n">output_path</span><span class="p">,</span>
        <span class="n">export_params</span><span class="o">=</span><span class="bp">True</span><span class="p">,</span>
        <span class="n">opset_version</span><span class="o">=</span><span class="n">opset_version</span><span class="p">,</span>
        <span class="n">do_constant_folding</span><span class="o">=</span><span class="bp">True</span><span class="p">,</span>
        <span class="n">input_names</span><span class="o">=</span><span class="p">[</span><span class="s">'input'</span><span class="p">],</span>
        <span class="n">output_names</span><span class="o">=</span><span class="p">[</span><span class="s">'output'</span><span class="p">],</span>
        <span class="n">dynamic_axes</span><span class="o">=</span><span class="p">{</span><span class="s">'input'</span><span class="p">:</span> <span class="p">{</span><span class="mi">0</span><span class="p">:</span> <span class="s">'batch_size'</span><span class="p">},</span>
                      <span class="s">'output'</span><span class="p">:</span> <span class="p">{</span><span class="mi">0</span><span class="p">:</span> <span class="s">'batch_size'</span><span class="p">}}</span>
    <span class="p">)</span>
    <span class="k">print</span><span class="p">(</span><span class="sa">f</span><span class="s">"모델이 opset 버전 </span><span class="si">{</span><span class="n">opset_version</span><span class="si">}</span><span class="s">으로 성공적으로 내보내졌습니다."</span><span class="p">)</span></code></pre></figure>
