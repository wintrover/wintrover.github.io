  <div class="section">
    <h3 data-en="Face Landmark Library Selection" data-ko="얼굴 랜드마크 라이브러리 선택"></h3>
    <ul class="steps">
      <li>
        <strong data-en="Problem:" data-ko="문제:"></strong>
        <ul>
          <li data-en="Initial testing revealed significant differences in landmark detection quality across libraries." data-ko="초기 테스트에서 라이브러리 간 랜드마크 검출 품질의 상당한 차이가 발견되었습니다."></li>
          <li data-en="Mediapipe, dlib, and FAN had varying accuracy under different lighting conditions and head poses." data-ko="Mediapipe, dlib, FAN은 다양한 조명 조건과 머리 포즈에서 서로 다른 정확도를 보였습니다."></li>
          <li data-en="Tried to use dlib initially but found it couldn't handle non-frontal faces well (only 60% accuracy)." data-ko="처음에는 dlib을 사용하려 했으나 정면이 아닌 얼굴을 잘 처리하지 못하는 것을 발견했습니다(정확도 60%에 불과)."></li>
        </ul>
      </li>
      <li>
        <strong data-en="Solution:" data-ko="해결책:"></strong>
        <ul>
          <li data-en="Created a comprehensive benchmark script to compare all three libraries (MPvsdlibvsFA.py)." data-ko="세 라이브러리를 모두 비교하는 종합적인 벤치마크 스크립트(MPvsdlibvsFA.py)를 작성했습니다."></li>
          <li data-en="Discovered MediaPipe provided the best balance of speed, accuracy, and landmark density (400+ points vs dlib's 68)." data-ko="MediaPipe가 속도, 정확도, 랜드마크 밀도(dlib의 68점 대비 400점 이상)의 최적의 균형을 제공한다는 사실을 발견했습니다."></li>
          <li data-en="Implemented a hybrid solution using both MediaPipe and dlib for specific cases where one outperformed the other." data-ko="한 라이브러리가 다른 라이브러리보다 성능이 뛰어난 특정 사례에 MediaPipe와 dlib을 모두 사용하는 하이브리드 솔루션을 구현했습니다."></li>
        </ul>
      </li>
    </ul>

  <!-- 메모리 문제와 CUDA 오류 -->
  <div class="section">
    <h3 data-en="Memory Issues and CUDA Errors" data-ko="메모리 문제와 CUDA 오류"></h3>
    <ul class="steps">
      <li>
        <strong data-en="Problem:" data-ko="문제:"></strong>
        <ul>
          <li data-en="Encountered 'CUDA out of memory' errors when loading multiple models simultaneously on older GPUs." data-ko="오래된 GPU에서 여러 모델을 동시에 로드할 때 'CUDA 메모리 부족' 오류가 발생했습니다."></li>
          <li data-en="FaceAlignment (FAN) model was consuming too much GPU memory (~2GB), causing crashes during benchmark tests." data-ko="FaceAlignment(FAN) 모델이 너무 많은 GPU 메모리(~2GB)를 소비하여 벤치마크 테스트 중 충돌이 발생했습니다."></li>
          <li data-en="Incompatible CUDA versions between torch and other libraries created runtime environment issues." data-ko="torch와 다른 라이브러리 간의 CUDA 버전 비호환성으로 런타임 환경 문제가 발생했습니다."></li>
        </ul>
      </li>
      <li>
        <strong data-en="Solution:" data-ko="해결책:"></strong>
        <ul>
          <li data-en="Implemented proper CUDA memory management with explicit garbage collection." data-ko="명시적 가비지 컬렉션으로 적절한 CUDA 메모리 관리를 구현했습니다."></li>
          <li data-en="Added dynamic device detection to fall back to CPU when GPU memory is insufficient." data-ko="GPU 메모리가 부족할 때 CPU로 폴백하는 동적 장치 감지를 추가했습니다."></li>
          <li data-en="Created environment isolation using Docker to avoid version conflicts in deployment." data-ko="배포 시 버전 충돌을 방지하기 위해 Docker를 사용한 환경 격리를 구현했습니다."></li>
        </ul>
      </li>
    </ul>

    <div class="code-block">
      <button class="hover-copy-btn" onclick="copyCode(this)">📋</button>

<figure class="highlight"><pre><code class="language-python" data-lang="python"><span class="c1"># 메모리 관리 개선 코드
</span><span class="kn">import</span> <span class="n">torch</span>
<span class="kn">import</span> <span class="n">gc</span>

<span class="k">def</span> <span class="nf">process_image_with_memory_safety</span><span class="p">(</span><span class="n">image_path</span><span class="p">,</span> <span class="n">use_gpu</span><span class="o">=</span><span class="bp">True</span><span class="p">):</span>
    <span class="k">try</span><span class="p">:</span>
        <span class="c1"># GPU 사용 가능 여부 및 메모리 확인
</span>        <span class="k">if</span> <span class="n">use_gpu</span> <span class="ow">and</span> <span class="n">torch</span><span class="p">.</span><span class="n">cuda</span><span class="p">.</span><span class="nf">is_available</span><span class="p">():</span>
            <span class="c1"># 현재 가용 메모리 확인
</span>            <span class="n">free_memory</span> <span class="o">=</span> <span class="n">torch</span><span class="p">.</span><span class="n">cuda</span><span class="p">.</span><span class="nf">get_device_properties</span><span class="p">(</span><span class="mi">0</span><span class="p">).</span><span class="n">total_memory</span> <span class="o">-</span> <span class="n">torch</span><span class="p">.</span><span class="n">cuda</span><span class="p">.</span><span class="nf">memory_allocated</span><span class="p">(</span><span class="mi">0</span><span class="p">)</span>
            <span class="k">if</span> <span class="n">free_memory</span> <span class="o">&lt;</span> <span class="mi">1024</span> <span class="o">*</span> <span class="mi">1024</span> <span class="o">*</span> <span class="mi">1024</span><span class="p">:</span>  <span class="c1"># 1GB 미만이면 CPU 사용
</span>                <span class="nf">print</span><span class="p">(</span><span class="sh">"</span><span class="s">GPU memory low, falling back to CPU</span><span class="sh">"</span><span class="p">)</span>
                <span class="n">device</span> <span class="o">=</span> <span class="n">torch</span><span class="p">.</span><span class="nf">device</span><span class="p">(</span><span class="sh">'</span><span class="s">cpu</span><span class="sh">'</span><span class="p">)</span>
            <span class="k">else</span><span class="p">:</span>
                <span class="n">device</span> <span class="o">=</span> <span class="n">torch</span><span class="p">.</span><span class="nf">device</span><span class="p">(</span><span class="sh">'</span><span class="s">cuda</span><span class="sh">'</span><span class="p">)</span>
        <span class="k">else</span><span class="p">:</span>
            <span class="n">device</span> <span class="o">=</span> <span class="n">torch</span><span class="p">.</span><span class="nf">device</span><span class="p">(</span><span class="sh">'</span><span class="s">cpu</span><span class="sh">'</span><span class="p">)</span>
            
        <span class="c1"># 모델 로드 및 처리
</span>        <span class="n">model</span><span class="p">.</span><span class="nf">to</span><span class="p">(</span><span class="n">device</span><span class="p">)</span>
        <span class="n">result</span> <span class="o">=</span> <span class="nf">model</span><span class="p">(</span><span class="n">image</span><span class="p">.</span><span class="nf">to</span><span class="p">(</span><span class="n">device</span><span class="p">))</span>
        
        <span class="k">return</span> <span class="n">result</span>
    <span class="k">finally</span><span class="p">:</span>
        <span class="c1"># 명시적 메모리 정리
</span>        <span class="k">if</span> <span class="n">torch</span><span class="p">.</span><span class="n">cuda</span><span class="p">.</span><span class="nf">is_available</span><span class="p">():</span>
            <span class="n">torch</span><span class="p">.</span><span class="n">cuda</span><span class="p">.</span><span class="nf">empty_cache</span><span class="p">()</span>
        <span class="n">gc</span><span class="p">.</span><span class="nf">collect</span><span class="p">()</span></code></pre></figure>

  <!-- 관상학 분석 알고리즘 개발 -->
  <div class="section">
    <h3 data-en="Physiognomy Analysis Algorithm Development" data-ko="관상학 분석 알고리즘 개발"></h3>
    <ul class="steps">
      <li>
        <strong data-en="Problem:" data-ko="문제:"></strong>
        <ul>
          <li data-en="Translating traditional face reading principles into quantifiable metrics proved challenging." data-ko="전통적인 관상학 원리를 정량화할 수 있는 지표로 변환하는 것이 어려웠습니다."></li>
          <li data-en="Initial measurements were inconsistent due to perspective distortion in selfie images." data-ko="셀카 이미지의 원근 왜곡으로 인해 초기 측정값이 일관되지 않았습니다."></li>
          <li data-en="Face measurement algorithm gave inaccurate results when face was not properly centered or aligned." data-ko="얼굴이 제대로 중앙에 위치하거나 정렬되지 않았을 때 얼굴 측정 알고리즘이 부정확한 결과를 제공했습니다."></li>
        </ul>
      </li>
      <li>
        <strong data-en="Solution:" data-ko="해결책:"></strong>
        <ul>
          <li data-en="Developed a comprehensive facial ratio system based on both modern research and traditional Eastern principles." data-ko="현대 연구와 전통적인 동양의 원리를 모두 기반으로 종합적인 얼굴 비율 시스템을 개발했습니다."></li>
          <li data-en="Implemented face alignment preprocessing to standardize input images before measurement." data-ko="측정 전 입력 이미지를 표준화하기 위한 얼굴 정렬 전처리를 구현했습니다."></li>
          <li data-en="Created a relative measurement system using facial width as a baseline to eliminate perspective issues." data-ko="원근 문제를 제거하기 위해 얼굴 너비를 기준으로 상대적 측정 시스템을 만들었습니다."></li>
        </ul>
      </li>
    </ul>

    <div class="code-block">
      <button class="hover-copy-btn" onclick="copyCode(this)">📋</button>

<figure class="highlight"><pre><code class="language-python" data-lang="python"><span class="c1"># face_measurements.py에서 얼굴 측정 알고리즘 일부
</span><span class="k">def</span> <span class="nf">get_face_measurements</span><span class="p">(</span><span class="n">landmarks</span><span class="p">,</span> <span class="n">img_width</span><span class="p">,</span> <span class="n">img_height</span><span class="p">):</span>
    <span class="c1"># 측정 점 정의 (MediaPipe Face Mesh의 인덱스 사용)
</span>    <span class="n">LEFT_EYE</span> <span class="o">=</span> <span class="p">[</span><span class="mi">33</span><span class="p">,</span> <span class="mi">133</span><span class="p">]</span>  <span class="c1"># 왼쪽 눈 외각, 내각
</span>    <span class="n">RIGHT_EYE</span> <span class="o">=</span> <span class="p">[</span><span class="mi">362</span><span class="p">,</span> <span class="mi">263</span><span class="p">]</span>  <span class="c1"># 오른쪽 눈 외각, 내각
</span>    
    <span class="c1"># 오류 발생 지점: 한 측정값이 0으로 나오는 경우 검사
</span>    <span class="n">mouth_width</span> <span class="o">=</span> <span class="n">np</span><span class="p">.</span><span class="n">linalg</span><span class="p">.</span><span class="nf">norm</span><span class="p">(</span><span class="n">landmarks</span><span class="p">[</span><span class="n">MOUTH_WIDTH</span><span class="p">[</span><span class="mi">0</span><span class="p">]]</span> <span class="o">-</span> <span class="n">landmarks</span><span class="p">[</span><span class="n">MOUTH_WIDTH</span><span class="p">[</span><span class="mi">1</span><span class="p">]])</span>
    <span class="n">mouth_height</span> <span class="o">=</span> <span class="n">np</span><span class="p">.</span><span class="n">linalg</span><span class="p">.</span><span class="nf">norm</span><span class="p">(</span><span class="n">landmarks</span><span class="p">[</span><span class="n">MOUTH_HEIGHT</span><span class="p">[</span><span class="mi">0</span><span class="p">]]</span> <span class="o">-</span> <span class="n">landmarks</span><span class="p">[</span><span class="n">MOUTH_HEIGHT</span><span class="p">[</span><span class="mi">1</span><span class="p">]])</span>
    <span class="k">if</span> <span class="n">mouth_height</span> <span class="o">==</span> <span class="mi">0</span><span class="p">:</span>
        <span class="nf">print</span><span class="p">(</span><span class="sh">"</span><span class="s">입 높이가 0으로 계산됨. 랜드마크 좌표 확인 필요:</span><span class="sh">"</span><span class="p">)</span>
        <span class="nf">print</span><span class="p">(</span><span class="sa">f</span><span class="sh">"</span><span class="s">MOUTH_HEIGHT[0]: </span><span class="si">{</span><span class="n">landmarks</span><span class="p">[</span><span class="n">MOUTH_HEIGHT</span><span class="p">[</span><span class="mi">0</span><span class="p">]]</span><span class="si">}</span><span class="sh">"</span><span class="p">)</span>
        <span class="nf">print</span><span class="p">(</span><span class="sa">f</span><span class="sh">"</span><span class="s">MOUTH_HEIGHT[1]: </span><span class="si">{</span><span class="n">landmarks</span><span class="p">[</span><span class="n">MOUTH_HEIGHT</span><span class="p">[</span><span class="mi">1</span><span class="p">]]</span><span class="si">}</span><span class="sh">"</span><span class="p">)</span>
        <span class="c1"># 기본값 설정 또는 다른 측정 방법 사용
</span>        
    <span class="c1"># 상대적 측정값: 얼굴 너비 대비 비율 계산
</span>    <span class="n">left_eye_center</span> <span class="o">=</span> <span class="p">(</span><span class="n">landmarks</span><span class="p">[</span><span class="mi">33</span><span class="p">]</span> <span class="o">+</span> <span class="n">landmarks</span><span class="p">[</span><span class="mi">133</span><span class="p">])</span> <span class="o">/</span> <span class="mi">2</span>  <span class="c1"># 왼쪽 눈 중심
</span>    <span class="n">right_eye_center</span> <span class="o">=</span> <span class="p">(</span><span class="n">landmarks</span><span class="p">[</span><span class="mi">362</span><span class="p">]</span> <span class="o">+</span> <span class="n">landmarks</span><span class="p">[</span><span class="mi">263</span><span class="p">])</span> <span class="o">/</span> <span class="mi">2</span>  <span class="c1"># 오른쪽 눈 중심
</span>    
    <span class="n">eye_left_ratio</span> <span class="o">=</span> <span class="p">(</span><span class="n">left_eye_center</span><span class="p">[</span><span class="mi">0</span><span class="p">]</span> <span class="o">-</span> <span class="n">landmarks</span><span class="p">[</span><span class="n">FACE_CONTOUR</span><span class="p">[</span><span class="mi">0</span><span class="p">]][</span><span class="mi">0</span><span class="p">])</span> <span class="o">/</span> <span class="n">face_width</span>
    <span class="n">eye_right_ratio</span> <span class="o">=</span> <span class="p">(</span><span class="n">landmarks</span><span class="p">[</span><span class="n">FACE_CONTOUR</span><span class="p">[</span><span class="mi">1</span><span class="p">]][</span><span class="mi">0</span><span class="p">]</span> <span class="o">-</span> <span class="n">right_eye_center</span><span class="p">[</span><span class="mi">0</span><span class="p">])</span> <span class="o">/</span> <span class="n">face_width</span>
    
    <span class="c1"># 얼굴 대칭 검사
</span>    <span class="n">symmetry_balance</span> <span class="o">=</span> <span class="nf">abs</span><span class="p">(</span><span class="n">eye_left_ratio</span> <span class="o">-</span> <span class="n">eye_right_ratio</span><span class="p">)</span></code></pre></figure>

    </div>
  </div>

  <!-- 멀티디바이스 호환성 문제 -->
  <div class="section">
    <h3 data-en="Multi-device Compatibility Issues" data-ko="멀티디바이스 호환성 문제"></h3>
    <ul class="steps">
      <li>
        <strong data-en="Problem:" data-ko="문제:"></strong>
        <ul>
          <li data-en="Face detection performed well on high-end devices but poorly on budget smartphones (especially older models)." data-ko="얼굴 검출이 고급 기기에서는 잘 작동했지만 저가형 스마트폰(특히 구형 모델)에서는 성능이 좋지 않았습니다."></li>
          <li data-en="Different camera resolutions and aspect ratios across devices created inconsistent landmark positioning." data-ko="기기마다 다른 카메라 해상도와 화면비로 인해 일관되지 않은 랜드마크 위치가 생겼습니다."></li>
          <li data-en="Mediapipe model was too large and slow for real-time processing on older devices (3+ seconds per frame)." data-ko="Mediapipe 모델이 구형 기기에서 실시간 처리에 너무 크고 느렸습니다(프레임당 3초 이상)."></li>
        </ul>
      </li>
      <li>
        <strong data-en="Solution:" data-ko="해결책:"></strong>
        <ul>
          <li data-en="Created a device capability detection system to adjust processing parameters automatically." data-ko="처리 매개변수를 자동으로 조정하는 기기 기능 감지 시스템을 만들었습니다."></li>
          <li data-en="Implemented a resolution normalization pipeline to standardize inputs across all devices." data-ko="모든 기기에서 입력을 표준화하는 해상도 정규화 파이프라인을 구현했습니다."></li>
          <li data-en="Developed a server-side processing option for low-end devices to offload complex calculations to our backend." data-ko="복잡한 계산을 백엔드로 오프로드하기 위해 저사양 기기를 위한 서버 측 처리 옵션을 개발했습니다."></li>
        </ul>
      </li>
    </ul>

    <div class="code-block">
      <button class="hover-copy-btn" onclick="copyCode(this)">📋</button>

<figure class="highlight"><pre><code class="language-python" data-lang="python"><span class="c1"># app.py에서 서버 측 처리 구현
</span><span class="nd">@app.route</span><span class="p">(</span><span class="sh">'</span><span class="s">/api/analyze-face</span><span class="sh">'</span><span class="p">,</span> <span class="n">methods</span><span class="o">=</span><span class="p">[</span><span class="sh">'</span><span class="s">POST</span><span class="sh">'</span><span class="p">])</span>
<span class="k">def</span> <span class="nf">analyze_face_endpoint</span><span class="p">():</span>
    <span class="k">if</span> <span class="sh">'</span><span class="s">image</span><span class="sh">'</span> <span class="ow">not</span> <span class="ow">in</span> <span class="n">request</span><span class="p">.</span><span class="n">files</span><span class="p">:</span>
        <span class="k">return</span> <span class="nf">jsonify</span><span class="p">({</span><span class="sh">'</span><span class="s">error</span><span class="sh">'</span><span class="p">:</span> <span class="sh">'</span><span class="s">No image provided</span><span class="sh">'</span><span class="p">}),</span> <span class="mi">400</span>
    
    <span class="nb">file</span> <span class="o">=</span> <span class="n">request</span><span class="p">.</span><span class="n">files</span><span class="p">[</span><span class="sh">'</span><span class="s">image</span><span class="sh">'</span><span class="p">]</span>
    <span class="n">temp_path</span> <span class="o">=</span> <span class="n">os</span><span class="p">.</span><span class="n">path</span><span class="p">.</span><span class="nf">join</span><span class="p">(</span><span class="n">tempfile</span><span class="p">.</span><span class="nf">gettempdir</span><span class="p">(),</span> <span class="nb">file</span><span class="p">.</span><span class="n">filename</span><span class="p">)</span>
    <span class="nb">file</span><span class="p">.</span><span class="nf">save</span><span class="p">(</span><span class="n">temp_path</span><span class="p">)</span>
    
    <span class="c1"># 장치 기능 헤더 확인
</span>    <span class="n">device_capability</span> <span class="o">=</span> <span class="n">request</span><span class="p">.</span><span class="n">headers</span><span class="p">.</span><span class="nf">get</span><span class="p">(</span><span class="sh">'</span><span class="s">X-Device-Capability</span><span class="sh">'</span><span class="p">,</span> <span class="sh">'</span><span class="s">low</span><span class="sh">'</span><span class="p">)</span>
    
    <span class="k">try</span><span class="p">:</span>
        <span class="c1"># 기기 성능에 따라 다른 처리 방법 사용
</span>        <span class="k">if</span> <span class="n">device_capability</span> <span class="o">==</span> <span class="sh">'</span><span class="s">high</span><span class="sh">'</span><span class="p">:</span>
            <span class="c1"># 고성능 기기: 모든 랜드마크 계산
</span>            <span class="n">result</span> <span class="o">=</span> <span class="nf">analyze_face</span><span class="p">(</span><span class="n">temp_path</span><span class="p">,</span> <span class="n">landmarks_type</span><span class="o">=</span><span class="sh">'</span><span class="s">full</span><span class="sh">'</span><span class="p">)</span>
        <span class="k">else</span><span class="p">:</span>
            <span class="c1"># 저성능 기기: 축소된 랜드마크 세트 사용
</span>            <span class="n">result</span> <span class="o">=</span> <span class="nf">analyze_face</span><span class="p">(</span><span class="n">temp_path</span><span class="p">,</span> <span class="n">landmarks_type</span><span class="o">=</span><span class="sh">'</span><span class="s">reduced</span><span class="sh">'</span><span class="p">)</span>
            
        <span class="k">return</span> <span class="nf">jsonify</span><span class="p">(</span><span class="n">result</span><span class="p">)</span>
    <span class="k">except</span> <span class="nb">Exception</span> <span class="k">as</span> <span class="n">e</span><span class="p">:</span>
        <span class="k">return</span> <span class="nf">jsonify</span><span class="p">({</span><span class="sh">'</span><span class="s">error</span><span class="sh">'</span><span class="p">:</span> <span class="nf">str</span><span class="p">(</span><span class="n">e</span><span class="p">)}),</span> <span class="mi">500</span>
    <span class="k">finally</span><span class="p">:</span>
        <span class="c1"># 임시 파일 정리
</span>        <span class="k">if</span> <span class="n">os</span><span class="p">.</span><span class="n">path</span><span class="p">.</span><span class="nf">exists</span><span class="p">(</span><span class="n">temp_path</span><span class="p">):</span>
            <span class="n">os</span><span class="p">.</span><span class="nf">remove</span><span class="p">(</span><span class="n">temp_path</span><span class="p">)</span></code></pre></figure>

    </div>
  </div>

  <!-- 소켓 통신과 실시간 메시징 -->
  <div class="section">
    <h3 data-en="Socket Communication and Real-time Messaging" data-ko="소켓 통신과 실시간 메시징"></h3>
    <ul class="steps">
      <li>
        <strong data-en="Problem:" data-ko="문제:"></strong>
        <ul>
          <li data-en="Initial WebSocket implementation suffered from frequent disconnections on mobile networks." data-ko="초기 WebSocket 구현이 모바일 네트워크에서 잦은 연결 끊김 현상을 겪었습니다."></li>
          <li data-en="Message delivery was unreliable with 15-20% message loss during network transitions." data-ko="네트워크 전환 중 15-20%의 메시지 손실로 메시지 전달이 불안정했습니다."></li>
          <li data-en="Chat history synchronization issues when users reconnected after being offline." data-ko="사용자가 오프라인 상태 후 재연결할 때 채팅 기록 동기화 문제가 발생했습니다."></li>
        </ul>
      </li>
      <li>
        <strong data-en="Solution:" data-ko="해결책:"></strong>
        <ul>
          <li data-en="Implemented Socket.IO with its automatic reconnection and transport fallback mechanisms." data-ko="자동 재연결 및 전송 폴백 메커니즘이 있는 Socket.IO를 구현했습니다."></li>
          <li data-en="Added Firebase Realtime Database as a message queue to guarantee delivery." data-ko="전송 보장을 위해 Firebase 실시간 데이터베이스를 메시지 큐로 추가했습니다."></li>
          <li data-en="Developed a client-side offline queuing system with read receipts and synchronization on reconnect." data-ko="재연결 시 읽음 확인 및 동기화 기능이 있는 클라이언트 측 오프라인 큐잉 시스템을 개발했습니다."></li>
        </ul>
      </li>
    </ul>

    <div class="code-block">
      <button class="hover-copy-btn" onclick="copyCode(this)">📋</button>

<figure class="highlight"><pre><code class="language-kotlin" data-lang="kotlin"><span class="c1">// 안드로이드 앱에서 소켓 통신 구현</span>
<span class="kd">class</span> <span class="nc">ChatService</span><span class="p">(</span><span class="k">private</span> <span class="kd">val</span> <span class="py">context</span><span class="p">:</span> <span class="nc">Context</span><span class="p">)</span> <span class="p">{</span>
    <span class="k">private</span> <span class="k">lateinit</span> <span class="kd">var</span> <span class="py">socket</span><span class="p">:</span> <span class="nc">Socket</span>
    <span class="k">private</span> <span class="kd">val</span> <span class="py">messageQueue</span> <span class="p">=</span> <span class="nc">ConcurrentLinkedQueue</span><span class="p">&lt;</span><span class="nc">ChatMessage</span><span class="p">&gt;()</span>
    <span class="k">private</span> <span class="kd">val</span> <span class="py">firebaseDB</span> <span class="p">=</span> <span class="nc">FirebaseDatabase</span><span class="p">.</span><span class="nf">getInstance</span><span class="p">().</span><span class="n">reference</span><span class="p">.</span><span class="nf">child</span><span class="p">(</span><span class="s">"messages"</span><span class="p">)</span>
    
    <span class="c1">// 안정적인 연결 설정</span>
    <span class="k">fun</span> <span class="nf">connect</span><span class="p">(</span><span class="n">userId</span><span class="p">:</span> <span class="nc">String</span><span class="p">)</span> <span class="p">{</span>
        <span class="k">try</span> <span class="p">{</span>
            <span class="kd">val</span> <span class="py">options</span> <span class="p">=</span> <span class="nc">IO</span><span class="p">.</span><span class="nc">Options</span><span class="p">().</span><span class="nf">apply</span> <span class="p">{</span>
                <span class="n">reconnection</span> <span class="p">=</span> <span class="k">true</span>
                <span class="n">reconnectionAttempts</span> <span class="p">=</span> <span class="nc">Int</span><span class="p">.</span><span class="nc">MAX_VALUE</span>
                <span class="n">reconnectionDelay</span> <span class="p">=</span> <span class="mi">1000</span>
                <span class="n">timeout</span> <span class="p">=</span> <span class="mi">20000</span>
            <span class="p">}</span>
            
            <span class="n">socket</span> <span class="p">=</span> <span class="nc">IO</span><span class="p">.</span><span class="nf">socket</span><span class="p">(</span><span class="s">"https://sodamyeon-api.com"</span><span class="p">,</span> <span class="n">options</span><span class="p">)</span>
            
            <span class="n">socket</span><span class="p">.</span><span class="nf">on</span><span class="p">(</span><span class="nc">Socket</span><span class="p">.</span><span class="nc">EVENT_CONNECT</span><span class="p">)</span> <span class="p">{</span>
                <span class="nc">Log</span><span class="p">.</span><span class="nf">d</span><span class="p">(</span><span class="nc">TAG</span><span class="p">,</span> <span class="s">"소켓 연결됨"</span><span class="p">)</span>
                <span class="n">socket</span><span class="p">.</span><span class="nf">emit</span><span class="p">(</span><span class="s">"register"</span><span class="p">,</span> <span class="n">userId</span><span class="p">)</span>
                <span class="nf">syncOfflineMessages</span><span class="p">()</span> <span class="c1">// 오프라인 메시지 동기화</span>
            <span class="p">}</span>
            
            <span class="n">socket</span><span class="p">.</span><span class="nf">on</span><span class="p">(</span><span class="nc">Socket</span><span class="p">.</span><span class="nc">EVENT_DISCONNECT</span><span class="p">)</span> <span class="p">{</span>
                <span class="nc">Log</span><span class="p">.</span><span class="nf">d</span><span class="p">(</span><span class="nc">TAG</span><span class="p">,</span> <span class="s">"소켓 연결 끊김 - 재연결 시도 중..."</span><span class="p">)</span>
            <span class="p">}</span>
            
            <span class="n">socket</span><span class="p">.</span><span class="nf">on</span><span class="p">(</span><span class="nc">Socket</span><span class="p">.</span><span class="nc">EVENT_RECONNECT_FAILED</span><span class="p">)</span> <span class="p">{</span>
                <span class="nc">Log</span><span class="p">.</span><span class="nf">e</span><span class="p">(</span><span class="nc">TAG</span><span class="p">,</span> <span class="s">"소켓 재연결 실패 - Firebase 폴백으로 전환"</span><span class="p">)</span>
                <span class="nf">enableFirebaseFallbackMode</span><span class="p">()</span>
            <span class="p">}</span>
            
            <span class="n">socket</span><span class="p">.</span><span class="nf">connect</span><span class="p">()</span>
        <span class="p">}</span> <span class="k">catch</span> <span class="p">(</span><span class="n">e</span><span class="p">:</span> <span class="nc">Exception</span><span class="p">)</span> <span class="p">{</span>
            <span class="nc">Log</span><span class="p">.</span><span class="nf">e</span><span class="p">(</span><span class="nc">TAG</span><span class="p">,</span> <span class="s">"소켓 초기화 오류"</span><span class="p">,</span> <span class="n">e</span><span class="p">)</span>
            <span class="nf">enableFirebaseFallbackMode</span><span class="p">()</span>
        <span class="p">}</span>
    <span class="p">}</span></code></pre></figure>

  <!-- 시니어 친화적 UI/UX 설계 -->
  <div class="section">
    <h3 data-en="Senior-Friendly UI/UX Design" data-ko="시니어 친화적 UI/UX 설계"></h3>
    <ul class="steps">
      <li>
        <strong data-en="Problem:" data-ko="문제:"></strong>
        <ul>
          <li data-en="Initial user tests with seniors showed confusion with standard mobile UI patterns and small touch targets." data-ko="시니어를 대상으로 한 초기 사용자 테스트에서 표준 모바일 UI 패턴과 작은 터치 영역에 대한 혼란이 나타났습니다."></li>
          <li data-en="Complex navigation flows resulted in task completion rates of only 45% among users 65+." data-ko="복잡한 탐색 흐름으로 인해 65세 이상 사용자 중 작업 완료율이 45%에 불과했습니다."></li>
          <li data-en="Text legibility issues with default font sizes and contrast ratios." data-ko="기본 글꼴 크기와 대비율로 인한 텍스트 가독성 문제가 있었습니다."></li>
        </ul>
      </li>
      <li>
        <strong data-en="Solution:" data-ko="해결책:"></strong>
        <ul>
          <li data-en="Redesigned UI with larger touch targets (minimum 48dp), increased font sizes, and higher contrast ratios." data-ko="더 큰 터치 대상(최소 48dp), 증가된 글꼴 크기 및 높은 대비율로 UI를 재설계했습니다."></li>
          <li data-en="Simplified navigation with clearer visual hierarchies and reduced number of steps to complete key tasks." data-ko="더 명확한 시각적 계층 구조와 주요 작업 완료 단계 수 감소로 탐색을 단순화했습니다."></li>
          <li data-en="Added optional voice guidance system for navigation and help functions." data-ko="탐색 및 도움말 기능을 위한 선택적 음성 안내 시스템을 추가했습니다."></li>
        </ul>
      </li>
    </ul>

<figure class="highlight"><pre><code class="language-xml" data-lang="xml"><span class="c">&lt;!-- 시니어 친화적 버튼 스타일 (res/values/styles.xml) --&gt;</span>
<span class="nt">&lt;style</span> <span class="na">name=</span><span class="s">"SeniorFriendlyButton"</span><span class="nt">&gt;</span>

    <span class="nt">&lt;item</span> <span class="na">name=</span><span class="s">"android:layout_height"</span><span class="nt">&gt;</span>60dp<span class="nt">&lt;/item&gt;</span>  <span class="c">&lt;!-- 더 큰 터치 영역 --&gt;</span>
    <span class="nt">&lt;item</span> <span class="na">name=</span><span class="s">"android:textSize"</span><span class="nt">&gt;</span>18sp<span class="nt">&lt;/item&gt;</span>  <span class="c">&lt;!-- 더 큰 텍스트 --&gt;</span>
    <span class="nt">&lt;item</span> <span class="na">name=</span><span class="s">"android:textColor"</span><span class="nt">&gt;</span>@color/white<span class="nt">&lt;/item&gt;</span>

    <span class="nt">&lt;item</span> <span class="na">name=</span><span class="s">"android:fontFamily"</span><span class="nt">&gt;</span>@font/noto_sans_medium<span class="nt">&lt;/item&gt;</span>
    <span class="nt">&lt;item</span> <span class="na">name=</span><span class="s">"android:background"</span><span class="nt">&gt;</span>@drawable/rounded_button_bg<span class="nt">&lt;/item&gt;</span>
    <span class="nt">&lt;item</span> <span class="na">name=</span><span class="s">"android:foreground"</span><span class="nt">&gt;</span>?attr/selectableItemBackground<span class="nt">&lt;/item&gt;</span>
    <span class="nt">&lt;item</span> <span class="na">name=</span><span class="s">"android:padding"</span><span class="nt">&gt;</span>16dp<span class="nt">&lt;/item&gt;</span>

<span class="nt">&lt;/style&gt;</span>
