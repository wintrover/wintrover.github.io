name: Pages Build & Deploy + Dev.to Drafts (Centralized)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: |
            pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile --prod=false
      - name: Install Chrome for Puppeteer
        run: pnpm exec puppeteer browsers install chrome
      - name: Generate Mermaid images
        env:
          BLOG_PUBLIC_BASE_URL: https://wintrover.github.io
        run: pnpm run images:generate:ci
      - name: Build for Pages
        run: pnpm run build:github
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4

  devto:
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: read
    steps:
      - name: Decide whether to publish
        id: devto_guard
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: |
          if [ -z "$DEVTO_API_KEY" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "should_publish=true" >> "$GITHUB_OUTPUT"
      - name: Checkout
        if: ${{ steps.devto_guard.outputs.should_publish == 'true' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Setup pnpm
        if: ${{ steps.devto_guard.outputs.should_publish == 'true' }}
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup Node
        if: ${{ steps.devto_guard.outputs.should_publish == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: |
            pnpm-lock.yaml
      - name: Install
        if: ${{ steps.devto_guard.outputs.should_publish == 'true' }}
        run: pnpm install --frozen-lockfile --prod=false
      - name: Upload changed posts to Dev.to
        if: ${{ steps.devto_guard.outputs.should_publish == 'true' }}
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          BLOG_PUBLIC_BASE_URL: https://wintrover.github.io
          BLOG_IMAGE_ABS_MODE: pages
        run: |
          FROM="${{ github.event.before }}"
          TO="${{ github.sha }}"
          if [ -z "$FROM" ]; then FROM="$(git rev-parse HEAD~1)"; fi
          CHANGED=$(git diff --name-only "$FROM" "$TO" | grep -E '^src/posts/.+\.md$' || true)
          if [ -z "$CHANGED" ]; then
            LATEST=$(find src/posts -type f -name '*.md' | sort -r | head -n 1)
            if [ -z "$LATEST" ]; then echo "No posts found"; exit 0; fi
            echo "No posts changed; publishing latest: $LATEST"
            npx tsx scripts/post-to-dev.ts "$LATEST"
            exit 0
          fi
          for f in $CHANGED; do
            echo "Publishing $f"
            npx tsx scripts/post-to-dev.ts "$f"
          done
