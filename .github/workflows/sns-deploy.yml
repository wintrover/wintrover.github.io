name: SNS Deploy State Machine

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Markdown file or directory target"
        required: false
        default: "src/posts"
        type: string
      platforms:
        description: "Comma separated platforms (devto,linkedin)"
        required: false
        default: "devto,linkedin"
        type: string

permissions:
  contents: write

concurrency:
  group: sns-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run SNS deployment
        env:
          BLOG_PUBLIC_BASE_URL: https://wintrover.github.io/
          DEPLOY_PLATFORMS: ${{ inputs.platforms }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: bun scripts/post-to-dev.ts "${{ inputs.target }}" "${{ inputs.platforms }}"

      - name: Persist deployment state
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .deploy STATUS.md
          if git diff --cached --quiet; then
            echo "No deployment state changes."
            exit 0
          fi
          git commit -m "chore(deploy): persist sns status snapshot [skip ci]"
          git push origin HEAD:main
