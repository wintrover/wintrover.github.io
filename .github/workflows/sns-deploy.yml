name: SNS Deploy State Machine

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Markdown file or directory target"
        required: false
        default: "src/posts"
        type: string
      platforms:
        description: "Comma separated platforms (devto,linkedin)"
        required: false
        default: "devto,linkedin"
        type: string

permissions:
  contents: write

concurrency:
  group: sns-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Checkout DB state branch
        id: checkout_state
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: DB
          path: database
          fetch-depth: 0

      - name: Initialize DB state branch when missing
        if: steps.checkout_state.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf database
          mkdir -p database
          cd database
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git checkout --orphan DB
          mkdir -p .deploy
          touch STATUS.md
          git add .deploy STATUS.md
          git commit -m "chore(deploy): bootstrap state branch [skip ci]"
          git push origin HEAD:DB

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run SNS deployment
        env:
          BLOG_PUBLIC_BASE_URL: https://wintrover.github.io/
          STATE_DATA_ROOT: ./database
          DEPLOY_PLATFORMS: ${{ inputs.platforms }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: bun scripts/post-to-dev.ts "${{ inputs.target }}" "${{ inputs.platforms }}"

      - name: Persist deployment state
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p database/.deploy
          if [ -d .deploy ]; then cp -R .deploy/. database/.deploy/; fi
          if [ -f STATUS.md ]; then cp STATUS.md database/STATUS.md; fi
          cd database
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .deploy STATUS.md
          if git diff --cached --quiet; then
            echo "No deployment state changes."
            exit 0
          fi
          git commit -m "chore(deploy): persist sns status snapshot [skip ci]"
          for attempt in 1 2 3; do
            if git push origin HEAD:DB; then
              echo "Push succeeded on attempt ${attempt}."
              exit 0
            fi
            if [ "${attempt}" = "3" ]; then
              echo "Push failed after 3 attempts."
              exit 1
            fi
            git pull --rebase origin DB
          done
